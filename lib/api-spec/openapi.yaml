openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: WhatsApp Store Builder API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: stores
    description: Store management
  - name: products
    description: Product management
  - name: orders
    description: Order management
  - name: categories
    description: Category management
  - name: dashboard
    description: Dashboard analytics
  - name: subscriptions
    description: Subscription plan management
  - name: ai
    description: AI-powered features
  - name: admin
    description: Platform admin operations
  - name: referrals
    description: Referral system
  - name: growth
    description: Growth tools (QR, sharing, broadcasts)

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /stores/me:
    get:
      operationId: getMyStore
      tags: [stores]
      summary: Get the current user's store
      responses:
        "200":
          description: Store found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Store"
        "404":
          description: Store not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateMyStore
      tags: [stores]
      summary: Update the current user's store
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateStoreBody"
      responses:
        "200":
          description: Store updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Store"

  /stores:
    post:
      operationId: createStore
      tags: [stores]
      summary: Create a new store for the current user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateStoreBody"
      responses:
        "201":
          description: Store created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Store"

  /stores/generate:
    post:
      operationId: generateStore
      tags: [stores]
      summary: AI-powered store generation from a business description
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateStoreBody"
      responses:
        "200":
          description: Generated store configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeneratedStoreConfig"

  /stores/{slug}:
    get:
      operationId: getPublicStore
      tags: [stores]
      summary: Get a public store by slug
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Store found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicStore"
        "404":
          description: Store not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /products:
    get:
      operationId: listProducts
      tags: [products]
      summary: List the current user's products
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: category
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of products
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductList"
    post:
      operationId: createProduct
      tags: [products]
      summary: Create a new product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProductBody"
      responses:
        "201":
          description: Product created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /products/{id}:
    get:
      operationId: getProduct
      tags: [products]
      summary: Get a product by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Product found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Product not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateProduct
      tags: [products]
      summary: Update a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProductBody"
      responses:
        "200":
          description: Product updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
    delete:
      operationId: deleteProduct
      tags: [products]
      summary: Delete a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Product deleted

  /stores/{slug}/products:
    get:
      operationId: listPublicProducts
      tags: [products]
      summary: List public products for a store
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
        - name: category
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of products
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductList"

  /categories:
    get:
      operationId: listCategories
      tags: [categories]
      summary: List categories for the current user's store
      responses:
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CategoryList"
    post:
      operationId: createCategory
      tags: [categories]
      summary: Create a new category
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCategoryBody"
      responses:
        "201":
          description: Category created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"

  /categories/{id}:
    delete:
      operationId: deleteCategory
      tags: [categories]
      summary: Delete a category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Category deleted

  /stores/{slug}/categories:
    get:
      operationId: listPublicCategories
      tags: [categories]
      summary: List public categories for a store
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CategoryList"

  /orders:
    get:
      operationId: listOrders
      tags: [orders]
      summary: List orders for the current user's store
      parameters:
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of orders
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderList"
    post:
      operationId: createOrder
      tags: [orders]
      summary: Create a new order (public)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrderBody"
      responses:
        "201":
          description: Order created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /orders/{id}:
    get:
      operationId: getOrder
      tags: [orders]
      summary: Get an order by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Order found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /orders/{id}/status:
    patch:
      operationId: updateOrderStatus
      tags: [orders]
      summary: Update order status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOrderStatusBody"
      responses:
        "200":
          description: Order updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [dashboard]
      summary: Get dashboard statistics
      responses:
        "200":
          description: Statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /dashboard/recent-orders:
    get:
      operationId: getRecentOrders
      tags: [dashboard]
      summary: Get recent orders for dashboard
      responses:
        "200":
          description: Recent orders
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderList"

  /dashboard/top-products:
    get:
      operationId: getTopProducts
      tags: [dashboard]
      summary: Get top products by sales
      responses:
        "200":
          description: Top products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TopProduct"

  # ─── Subscriptions ───────────────────────────────────────────────────────
  /subscriptions/me:
    get:
      operationId: getMySubscription
      tags: [subscriptions]
      summary: Get the current user's subscription
      responses:
        "200":
          description: Subscription found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subscription"

  /subscriptions/plans:
    get:
      operationId: listPlans
      tags: [subscriptions]
      summary: List all available plans
      responses:
        "200":
          description: List of plans
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PlanInfo"

  /subscriptions/upgrade:
    post:
      operationId: upgradePlan
      tags: [subscriptions]
      summary: Upgrade subscription plan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpgradePlanBody"
      responses:
        "200":
          description: Plan upgraded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subscription"

  /subscriptions/limits:
    get:
      operationId: getUsageLimits
      tags: [subscriptions]
      summary: Get current usage vs plan limits
      responses:
        "200":
          description: Usage limits
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UsageLimits"

  # ─── AI Features ─────────────────────────────────────────────────────────
  /ai/generate-description:
    post:
      operationId: generateProductDescription
      tags: [ai]
      summary: Generate AI product description
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateDescriptionBody"
      responses:
        "200":
          description: Generated description
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateDescriptionResponse"

  /ai/pricing-suggestion:
    post:
      operationId: getPricingSuggestion
      tags: [ai]
      summary: Get AI pricing suggestions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PricingSuggestionBody"
      responses:
        "200":
          description: Pricing suggestion
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PricingSuggestionResponse"

  /ai/enhance-image:
    post:
      operationId: enhanceProductImage
      tags: [ai]
      summary: Generate an enhanced/professional product image
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EnhanceImageBody"
      responses:
        "200":
          description: Enhanced image as base64
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnhanceImageResponse"

  # ─── Admin ────────────────────────────────────────────────────────────────
  /admin/stats:
    get:
      operationId: getAdminStats
      tags: [admin]
      summary: Get platform-wide statistics (admin only)
      responses:
        "200":
          description: Admin statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"

  /admin/stores:
    get:
      operationId: adminListStores
      tags: [admin]
      summary: List all stores (admin only)
      parameters:
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of stores
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStoreList"

  /admin/stores/{id}/plan:
    patch:
      operationId: adminUpdateStorePlan
      tags: [admin]
      summary: Update a store's subscription plan (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminUpdatePlanBody"
      responses:
        "200":
          description: Plan updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subscription"

  /admin/analytics:
    get:
      operationId: getAdminAnalytics
      tags: [admin]
      summary: Get multi-store analytics (admin only)
      responses:
        "200":
          description: Analytics data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminAnalytics"

  # ─── Referrals ────────────────────────────────────────────────────────────
  /referrals/my-code:
    get:
      operationId: getMyReferralCode
      tags: [referrals]
      summary: Get or create the current user's referral code
      responses:
        "200":
          description: Referral code
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReferralCode"

  /referrals/stats:
    get:
      operationId: getReferralStats
      tags: [referrals]
      summary: Get referral statistics
      responses:
        "200":
          description: Referral stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReferralStats"

  /referrals/apply:
    post:
      operationId: applyReferralCode
      tags: [referrals]
      summary: Apply a referral code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApplyReferralBody"
      responses:
        "200":
          description: Referral applied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplyReferralResponse"

  # ─── Growth Tools ─────────────────────────────────────────────────────────
  /growth/qr-code:
    get:
      operationId: getQrCode
      tags: [growth]
      summary: Generate a QR code for the store
      responses:
        "200":
          description: QR code as SVG
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QrCodeResponse"

  /growth/share-link:
    get:
      operationId: getShareLink
      tags: [growth]
      summary: Get shareable store link with UTM params
      responses:
        "200":
          description: Share link info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShareLinkResponse"

  /growth/broadcast:
    post:
      operationId: sendBroadcast
      tags: [growth]
      summary: Generate a WhatsApp broadcast message
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BroadcastBody"
      responses:
        "200":
          description: Broadcast message ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BroadcastResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    Store:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: string
        name:
          type: string
        slug:
          type: string
        description:
          type: ["string", "null"]
        whatsappNumber:
          type: string
        currency:
          type: string
        logoUrl:
          type: ["string", "null"]
        bannerUrl:
          type: ["string", "null"]
        theme:
          type: string
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - userId
        - name
        - slug
        - whatsappNumber
        - currency
        - theme
        - isActive
        - createdAt
        - updatedAt

    PublicStore:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        description:
          type: ["string", "null"]
        whatsappNumber:
          type: string
        currency:
          type: string
        logoUrl:
          type: ["string", "null"]
        bannerUrl:
          type: ["string", "null"]
        theme:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - slug
        - whatsappNumber
        - currency
        - theme
        - createdAt
        - updatedAt

    UpdateStoreBody:
      type: object
      properties:
        name:
          type: string
        description:
          type: ["string", "null"]
        whatsappNumber:
          type: string
        currency:
          type: string
        logoUrl:
          type: ["string", "null"]
        bannerUrl:
          type: ["string", "null"]
        theme:
          type: string

    UpdateMyStoreBody:
      type: object
      properties:
        name:
          type: string
        description:
          type: ["string", "null"]
        whatsappNumber:
          type: string
        currency:
          type: string
        logoUrl:
          type: ["string", "null"]
        bannerUrl:
          type: ["string", "null"]
        theme:
          type: string

    CreateStoreBody:
      type: object
      properties:
        name:
          type: string
        slug:
          type: string
        description:
          type: ["string", "null"]
        whatsappNumber:
          type: string
        currency:
          type: string
        logoUrl:
          type: ["string", "null"]
        bannerUrl:
          type: ["string", "null"]
        theme:
          type: string
      required:
        - name
        - slug
        - whatsappNumber

    GenerateStoreBody:
      type: object
      properties:
        description:
          type: string
      required:
        - description

    GeneratedStoreConfig:
      type: object
      properties:
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        categories:
          type: array
          items:
            type: string
        sampleProducts:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              price:
                type: number
              category:
                type: string
              description:
                type: string
      required:
        - name
        - slug
        - description
        - categories
        - sampleProducts

    Product:
      type: object
      properties:
        id:
          type: integer
        storeId:
          type: integer
        name:
          type: string
        description:
          type: ["string", "null"]
        price:
          type: number
        imageUrl:
          type: ["string", "null"]
        category:
          type: ["string", "null"]
        stock:
          type: ["integer", "null"]
        isAvailable:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - storeId
        - name
        - price
        - isAvailable
        - createdAt
        - updatedAt

    ProductList:
      type: array
      items:
        $ref: "#/components/schemas/Product"

    CreateProductBody:
      type: object
      properties:
        name:
          type: string
        description:
          type: ["string", "null"]
        price:
          type: number
        imageUrl:
          type: ["string", "null"]
        category:
          type: ["string", "null"]
        stock:
          type: ["integer", "null"]
        isAvailable:
          type: boolean
      required:
        - name
        - price

    UpdateProductBody:
      type: object
      properties:
        name:
          type: string
        description:
          type: ["string", "null"]
        price:
          type: number
        imageUrl:
          type: ["string", "null"]
        category:
          type: ["string", "null"]
        stock:
          type: ["integer", "null"]
        isAvailable:
          type: boolean

    Category:
      type: object
      properties:
        id:
          type: integer
        storeId:
          type: integer
        name:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - storeId
        - name
        - createdAt

    CategoryList:
      type: array
      items:
        $ref: "#/components/schemas/Category"

    CreateCategoryBody:
      type: object
      properties:
        name:
          type: string
      required:
        - name

    OrderItem:
      type: object
      properties:
        productId:
          type: integer
        productName:
          type: string
        price:
          type: number
        quantity:
          type: integer
      required:
        - productId
        - productName
        - price
        - quantity

    Order:
      type: object
      properties:
        id:
          type: integer
        storeId:
          type: integer
        customerName:
          type: string
        customerPhone:
          type: ["string", "null"]
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"
        total:
          type: number
        status:
          type: string
        notes:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - storeId
        - customerName
        - items
        - total
        - status
        - createdAt
        - updatedAt

    OrderList:
      type: array
      items:
        $ref: "#/components/schemas/Order"

    CreateOrderBody:
      type: object
      properties:
        storeId:
          type: integer
        customerName:
          type: string
        customerPhone:
          type: ["string", "null"]
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"
        total:
          type: number
        notes:
          type: ["string", "null"]
      required:
        - storeId
        - customerName
        - items
        - total

    UpdateOrderStatusBody:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    DashboardStats:
      type: object
      properties:
        totalOrders:
          type: integer
        totalRevenue:
          type: number
        totalProducts:
          type: integer
        pendingOrders:
          type: integer
        completedOrders:
          type: integer
        revenueThisMonth:
          type: number
        ordersThisMonth:
          type: integer
      required:
        - totalOrders
        - totalRevenue
        - totalProducts
        - pendingOrders
        - completedOrders
        - revenueThisMonth
        - ordersThisMonth

    TopProduct:
      type: object
      properties:
        productId:
          type: integer
        productName:
          type: string
        totalOrders:
          type: integer
        totalRevenue:
          type: number
      required:
        - productId
        - productName
        - totalOrders
        - totalRevenue

    # ─── Subscriptions ───────────────────────────────────────────────────────
    Subscription:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: string
        plan:
          type: string
        status:
          type: string
        currentPeriodStart:
          type: ["string", "null"]
          format: date-time
        currentPeriodEnd:
          type: ["string", "null"]
          format: date-time
        createdAt:
          type: string
